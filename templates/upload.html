{% extends "base.html" %}
{% load static %}

{% block title %}Upload Resume | WorkResume ATS{% endblock %}

{% block content %}
<div class="card">
    <h1>Upload Resume</h1>
    <p>Please upload your resume to check ATS compatibility.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="resume">Select Resume (PDF / DOCX)</label>
            <input
                type="file"
                name="resume"
                id="resume"
                accept=".pdf,.doc,.docx"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary">
            Upload Resume
        </button>
    </form>
</div>
{% endblock %}
