<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WorkResume ATS{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #1e293b;

            /* 🌸 Pink + Lavender Background */
            background: linear-gradient(
                135deg,
                #fbc2eb,   /* soft pink */
                #e6c8ff,   /* lavender */
                #d8b4fe    /* light purple */
            );
        }

        /* Navbar */
        nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;

            /* Gradient text */
            background: linear-gradient(90deg, #ec4899, #a855f7);
            background-clip: text;               /* Standard */
            -webkit-background-clip: text;       /* WebKit */
            color: transparent;
        }

        .nav-links a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #ec4899;
        }

        /* Main Content */
        main {
            padding: 2.5rem;
        }

        /* Card-style container (optional but nice) */
        .card {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 14px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.2rem;
            margin-top: 3rem;
            color: #475569;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">WorkResume ATS</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/upload/">Upload Resume</a>
            <a href="/about/">About</a>
        </div>
    </nav>

    <!-- Page Content -->
    <main>
        <div class="card">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer>
        © 2026 WorkResume ATS. All rights reserved.
    </footer>

    {% block extra_js %}{% endblock %}

</body>
</html>
